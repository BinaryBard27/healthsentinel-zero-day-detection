{
  "options": {
    "host_identifier": "hostname",
    "schedule_splay_percent": 10,
    "logger_plugin": "tls",
    "tls_hostname": "localhost:8080",
    "tls_enroll_max_attempts": 3
  },
  "schedule": {
    "user_login_events": {
      "query": "SELECT username, type, time, host FROM last WHERE time > (strftime('%s','now') - 60);",
      "interval": 60,
      "description": "Track user login events"
    },
    "file_access_events": {
      "query": "SELECT target_path, action, time, uid FROM file_events WHERE target_path LIKE '%patient%' OR target_path LIKE '%medical%' OR target_path LIKE '%health%';",
      "interval": 30,
      "description": "Monitor access to sensitive files"
    },
    "network_connections": {
      "query": "SELECT pid, local_address, local_port, remote_address, remote_port, protocol, state FROM process_open_sockets WHERE remote_address != '' AND remote_address != '127.0.0.1';",
      "interval": 60,
      "description": "Track outbound network connections"
    },
    "usb_devices": {
      "query": "SELECT vendor, model, serial, removable FROM usb_devices;",
      "interval": 30,
      "description": "Monitor USB device connections"
    },
    "process_events": {
      "query": "SELECT pid, path, cmdline, uid, time FROM process_events WHERE time > (strftime('%s','now') - 60);",
      "interval": 60,
      "description": "Track process execution"
    },
    "registry_changes": {
      "query": "SELECT path, name, type, data FROM registry WHERE path LIKE 'HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run%';",
      "interval": 120,
      "description": "Monitor autorun registry keys"
    }
  },
  "packs": {
    "insider_threat": "/etc/osquery/packs/insider_threat.conf"
  },
  "decorators": {
    "load": [
      "SELECT hostname AS host FROM system_info;",
      "SELECT user AS current_user FROM logged_in_users LIMIT 1;"
    ]
  }
}
