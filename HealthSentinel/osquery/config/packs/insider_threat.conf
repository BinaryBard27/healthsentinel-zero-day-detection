{
  "queries": {
    "high_privilege_access": {
      "query": "SELECT username, type, host FROM logged_in_users WHERE username IN ('Administrator', 'root', 'admin');",
      "interval": 30,
      "description": "Detect admin account usage - potential insider threat"
    },
    "large_file_operations": {
      "query": "SELECT target_path, action, md5, size FROM file_events WHERE size > 10000000;",
      "interval": 60,
      "description": "Track large file operations - potential data exfiltration"
    },
    "off_hours_activity": {
      "query": "SELECT username, type, time FROM last WHERE CAST(strftime('%H', datetime(time, 'unixepoch')) AS INTEGER) NOT BETWEEN 7 AND 19;",
      "interval": 300,
      "description": "Detect off-hours login activity"
    },
    "sensitive_directory_access": {
      "query": "SELECT target_path, action, uid, time FROM file_events WHERE target_path LIKE '%/patient%' OR target_path LIKE '%/records%' OR target_path LIKE '%/billing%' OR target_path LIKE '%/PHI%';",
      "interval": 30,
      "description": "Monitor access to sensitive healthcare directories"
    },
    "external_network_connections": {
      "query": "SELECT p.name, p.path, ps.remote_address, ps.remote_port FROM processes p JOIN process_open_sockets ps ON p.pid = ps.pid WHERE ps.remote_address NOT LIKE '192.168.%' AND ps.remote_address NOT LIKE '10.%' AND ps.remote_address NOT LIKE '172.16.%' AND ps.remote_address != '127.0.0.1' AND ps.remote_address != '';",
      "interval": 60,
      "description": "Detect connections to external IPs - potential data exfiltration"
    },
    "clipboard_access": {
      "query": "SELECT name, path FROM processes WHERE name LIKE '%clip%' OR cmdline LIKE '%clipboard%';",
      "interval": 120,
      "description": "Monitor clipboard access processes"
    },
    "encryption_tool_usage": {
      "query": "SELECT name, path, cmdline FROM processes WHERE name LIKE '%crypt%' OR name LIKE '%zip%' OR name LIKE '%rar%' OR cmdline LIKE '%encrypt%';",
      "interval": 60,
      "description": "Detect encryption/compression tool usage - potential data hiding"
    },
    "mass_file_access": {
      "query": "SELECT uid, COUNT(*) as file_count FROM file_events WHERE time > (strftime('%s','now') - 300) GROUP BY uid HAVING file_count > 50;",
      "interval": 300,
      "description": "Detect mass file access by single user"
    }
  }
}
